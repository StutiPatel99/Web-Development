<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lists</title>
  </head>
  <body>
    <h1>Lorem, ipsum dolor.</h1>
    <h2>Lorem ipsum dolor sit.</h2>
    <h3>Lorem ipsum dolor sit amet.</h3>
    <p>Lorem ipsum <strong>dolor</strong> sit <b>amet</b>.</p>
    <p>Lorem <em>ipsum</em> dolor <i>sit</i> amet.</p>
    <img src="./images/514187c69aca657df8b8ff55ac832e59.jpg" alt="" />
    <div>
      <h1>block level elements</h1>
      <ul>
        <li>heading h1 to h6</li>
        <li>ol, li</li>
        <li>p</li>
      </ul>
    </div>
    <div>
      <h1>Inline elements</h1>
      <ul>
        <li>a tags</li>
        <li>img</li>
        <li>strong</li>
        <li>em</li>
      </ul>
    </div>
  </body>
</html>
